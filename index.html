/* Ad placeholder */

<script>
// Firebase init
firebase.initializeApp({
  apiKey:"AIzaSyC977FBxgGqVCrEjYc_J5JlefMWNCgffg0",
  authDomain:"yuchenchen-60a08.firebaseapp.com",
  databaseURL:"https://yuchenchen-60a08-default-rtdb.firebaseio.com",
  projectId:"yuchenchen-60a08"
});
const db = firebase.database();

// Game state
const TOTAL_ROUNDS = 5;
let currentRound = 0;
let results = []; // {ms: number, foul: boolean}
let state = 'menu'; // menu, waiting, ready, tooearly, result, final
let greenTimeout = null;
let greenTime = 0;

const game = document.getElementById('game');
const screens = {
  menu: document.getElementById('menu-screen'),
  waiting: document.getElementById('wait-screen'),
  ready: document.getElementById('ready-screen'),
  tooearly: document.getElementById('early-screen'),
  result: document.getElementById('result-screen'),
  final: document.getElementById('final-screen')
};

function showScreen(name) {
  state = name;
  game.className = 'state-' + (name === 'waiting' ? 'waiting' : name === 'ready' ? 'ready' : name === 'tooearly' ? 'tooearly' : name === 'result' ? 'result' : name === 'final' ? 'final' : 'menu');
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
  if (name === 'final') {
    game.style.overflowY = 'auto';
    game.scrollTop = 0;
  } else {
    game.style.overflowY = 'hidden';
  }
}

// Personal best
function getPB() { return parseInt(localStorage.getItem('reaction-pb') || '0'); }
function setPB(ms) { localStorage.setItem('reaction-pb', ms); }

function showPB() {
  const pb = getPB();
  const el = document.getElementById('pb-display');
  el.textContent = pb ? `個人最佳: ${pb}ms` : '';
}

// Taunts
const earlyTaunts = ["太早了！你是不是偷看？","耐心是美德","急什麼！等綠色啊","你搶跑了 🏃","冷靜點，深呼吸"];
const roundTaunts = {
  150: ["...你是開掛的吧？","人類不可能有這種反應","你是機器人嗎？"],
  180: ["電競選手級","你的神經傳導速度異常","可以去打職業了"],
  220: ["還不錯","比大部分人快","中上水準"],
  270: ["普通人類","平均水準，沒什麼好驕傲的","一般般"],
  350: ["有點慢...","你是剛睡醒嗎","需要咖啡嗎"],
  500: ["烏龜級反應力","你奶奶可能比你快","是不是在看手機"],
  9999:["你確定你還活著嗎","建議去醫院檢查","...你睡著了？"]
};

function getTaunt(ms) {
  const thresholds = [150,180,220,270,350,500,9999];
  for (const t of thresholds) { if (ms < t) return roundTaunts[t][Math.random()*roundTaunts[t].length|0]; }
  return roundTaunts[9999][0];
}

function getRank(ms) {
  if (ms < 150) return {rank:'SSS',color:'#ff2d55',label:'前 0.01% — 非人類',pct:0.01};
  if (ms < 170) return {rank:'SS',color:'#ff6b00',label:'前 0.1%',pct:0.1};
  if (ms < 200) return {rank:'S',color:'#ffcc00',label:'前 1%',pct:1};
  if (ms < 230) return {rank:'A',color:'var(--green)',label:'前 5%',pct:5};
  if (ms < 270) return {rank:'B',color:'var(--blue)',label:'前 20%',pct:20};
  if (ms < 350) return {rank:'C',color:'var(--white)',label:'前 50%',pct:50};
  if (ms < 500) return {rank:'D',color:'var(--gray)',label:'前 80%',pct:80};
  return {rank:'F',color:'#ff2d55',label:'請確認你還有脈搏',pct:99};
}

function getAgeCompare(ms) {
  if (ms < 160) return "你的反應力比 18 歲電競選手還快";
  if (ms < 200) return "你的反應力相當於 20 歲年輕人";
  if (ms < 240) return "你的反應力相當於 25 歲成年人";
  if (ms < 280) return "你的反應力相當於 35 歲上班族";
  if (ms < 330) return "你的反應力比 45 歲中年人還慢一點";
  if (ms < 400) return "你的反應力相當於 55 歲退休人士";
  if (ms < 500) return "你的反應力比 65 歲老人還慢";
  return "你的反應力比 80 歲老人還慢...建議多運動";
}

// Fake player count
function fakeCount() {
  const base = 3291847;
  const extra = Math.floor((Date.now() - new Date('2026-01-01').getTime()) / 30000);
  return (base + extra).toLocaleString();
}
document.getElementById('total-players').textContent = fakeCount();

// Start
function startGame() {
  currentRound = 0;
  results = [];
  nextRound();
}

function nextRound() {
  currentRound++;
  document.getElementById('roundNum').textContent = currentRound;
  showScreen('waiting');
  const delay = 1000 + Math.random() * 4000;
  greenTimeout = setTimeout(() => {
    greenTime = performance.now();
    showScreen('ready');
  }, delay);
}

// Tap handling
game.addEventListener('click', (e) => {
  if (e.target.closest('button') || e.target.closest('.modal') || e.target.closest('.share-btns') || e.target.closest('.final-btns') || e.target.closest('.menu-btns')) return;

  if (state === 'waiting') {
    // Too early
    clearTimeout(greenTimeout);
    results.push({ms: 1000, foul: true});
    document.getElementById('earlyTaunt').textContent = earlyTaunts[Math.random()*earlyTaunts.length|0];
    showScreen('tooearly');
  } else if (state === 'ready') {
    const ms = Math.round(performance.now() - greenTime);
    results.push({ms, foul: false});
    document.getElementById('msDisplay').textContent = ms + 'ms';
    document.getElementById('msDisplay').style.color = ms < 200 ? 'var(--green)' : ms < 300 ? 'var(--white)' : 'var(--red)';
    document.getElementById('roundTaunt').textContent = getTaunt(ms);
    document.getElementById('roundInfo').textContent = `第 ${currentRound} / ${TOTAL_ROUNDS} 輪`;
    showScreen('result');
  } else if (state === 'tooearly' || state === 'result') {
    if (currentRound < TOTAL_ROUNDS) {
      nextRound();
    } else {
      showFinal();
    }
  }
});

function showFinal() {
  const validResults = results.filter(r => !r.foul);
  const totalMs = results.reduce((sum, r) => sum + r.ms, 0);
  const avg = Math.round(totalMs / results.length);

  const info = getRank(avg);

  document.getElementById('rankBadge').textContent = info.rank;
  document.getElementById('rankBadge').style.color = info.color;
  document.getElementById('rankLabel').textContent = info.label;
  document.getElementById('avgDisplay').textContent = avg + 'ms';
  document.getElementById('tauntFinal').textContent = getTaunt(avg);
  document.getElementById('ageCompare').textContent = getAgeCompare(avg);
  document.getElementById('percentile').textContent = `你的成績超越了 ${(100 - info.pct).toFixed(2)}% 的玩家`;

  // Rounds list
  const list = document.getElementById('roundsList');
  list.innerHTML = '';
  results.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'round-row';
    const cls = r.foul ? 'foul' : r.ms < 200 ? 'fast' : r.ms < 300 ? 'mid' : 'slow';
    row.innerHTML = `<span class="r-num">第 ${i+1} 輪</span><span class="r-val ${cls}">${r.foul ? '犯規 (+1000ms)' : r.ms + 'ms'}</span>`;
    list.appendChild(row);
  });

  // Personal best
  const pb = getPB();
  if (!pb || avg < pb) {
    setPB(avg);
    document.getElementById('pb-final').innerHTML = `<span style="color:var(--green);font-size:14px">🎉 新個人最佳！</span>`;
  } else {
    document.getElementById('pb-final').innerHTML = `<span style="color:var(--gray);font-size:14px">個人最佳: ${pb}ms</span>`;
  }

  // Save to Firebase
  saveScore(avg);

  showScreen('final');

  // Try push ads
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
}

// Firebase
function saveScore(avg) {
  const name = 'Player_' + Math.random().toString(36).substr(2,5);
  db.ref('reaction-scores').push({
    name,
    ms: avg,
    rounds: results.map(r => r.foul ? 'foul' : r.ms),
    ts: Date.now()
  }).catch(() => {});
}

function loadLeaderboard() {
  const list = document.getElementById('lbList');
  list.innerHTML = '<div style="color:var(--gray);text-align:center;padding:20px">載入中...</div>';
  db.ref('reaction-scores').orderByChild('ms').limitToFirst(20).once('value').then(snap => {
    list.innerHTML = '';
    let rank = 0;
    snap.forEach(child => {
      rank++;
      const d = child.val();
      const row = document.createElement('div');
      row.className = 'lb-row';
      const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      row.innerHTML = `<span class="lb-rank">${medal}</span><span class="lb-name">${d.name || 'Anonymous'}</span><span class="lb-ms">${d.ms}ms</span>`;
      list.appendChild(row);
    });
    if (rank === 0) list.innerHTML = '<div style="color:var(--gray);text-align:center;padding:20px">還沒有記錄</div>';
  }).catch(() => {
    list.innerHTML = '<div style="color:var(--gray);text-align:center;padding:20px">無法載入</div>';
  });
}

// Share
function getShareText(avg) {
  const info = getRank(avg);
  return `⚡ 反應力測試結果\n\n🏅 等級: ${info.rank}\n⏱️ 平均: ${avg}ms\n📊 ${info.label}\n\n${getTaunt(avg)}\n\n你能比我快嗎？👇\nhttps://yuchenchen-debug.github.io/reaction-test/`;
}

function generateShareImage(avg) {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const w = 1080, h = 1080;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);

  // Top accent
  const info = getRank(avg);
  ctx.fillStyle = info.rank === 'F' || info.rank === 'SSS' ? '#ff2d55' : info.color === 'var(--green)' ? '#00ff88' : info.color === 'var(--blue)' ? '#00f0ff' : '#ff2d55';
  ctx.fillRect(0, 0, w, 6);

  // Title
  ctx.fillStyle = '#888';
  ctx.font = '600 36px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('⚡ 反應力測試', w/2, 120);

  // Rank
  ctx.font = '800 180px JetBrains Mono, monospace';
  ctx.fillStyle = ctx.fillStyle = info.rank === 'SSS' ? '#ff2d55' : info.rank === 'SS' ? '#ff6b00' : info.rank === 'S' ? '#ffcc00' : info.rank === 'A' ? '#00ff88' : info.rank === 'B' ? '#00f0ff' : '#888';
  ctx.fillText(info.rank, w/2, 360);

  // MS
  ctx.font = '800 140px JetBrains Mono, monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(avg + 'ms', w/2, 540);

  // Label
  ctx.font = '600 32px JetBrains Mono, monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('平均反應時間', w/2, 600);

  // Percentile
  ctx.font = '600 36px JetBrains Mono, monospace';
  ctx.fillStyle = '#00f0ff';
  ctx.fillText(info.label, w/2, 700);

  // Taunt
  ctx.font = '600 32px JetBrains Mono, monospace';
  ctx.fillStyle = '#ff2d55';
  const taunt = getTaunt(avg);
  ctx.fillText(taunt.length > 16 ? taunt.substring(0,16) + '...' : taunt, w/2, 780);

  // Rounds
  ctx.font = '400 28px JetBrains Mono, monospace';
  results.forEach((r, i) => {
    const y = 860 + i * 36;
    ctx.fillStyle = '#555';
    ctx.textAlign = 'left';
    ctx.fillText(`R${i+1}`, 300, y);
    ctx.textAlign = 'right';
    ctx.fillStyle = r.foul ? '#00f0ff' : r.ms < 200 ? '#00ff88' : r.ms < 300 ? '#fff' : '#ff2d55';
    ctx.fillText(r.foul ? '犯規' : r.ms + 'ms', 780, y);
  });

  // URL
  ctx.textAlign = 'center';
  ctx.font = '400 24px JetBrains Mono, monospace';
  ctx.fillStyle = '#444';
  ctx.fillText('yuchenchen-debug.github.io/reaction-test', w/2, 1055);

  return canvas;
}

document.getElementById('shareLine').addEventListener('click', () => {
  const avg = getAvg();
  const text = getShareText(avg);
  window.open('https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent('https://yuchenchen-debug.github.io/reaction-test/') + '&text=' + encodeURIComponent(text));
});

document.getElementById('shareTwitter').addEventListener('click', () => {
  const avg = getAvg();
  const text = getShareText(avg);
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text));
});

document.getElementById('shareCopy').addEventListener('click', () => {
  const avg = getAvg();
  navigator.clipboard.writeText(getShareText(avg)).then(() => {
    document.getElementById('shareCopy').textContent = '✅ 已複製';
    setTimeout(() => document.getElementById('shareCopy').textContent = '📋 複製', 2000);
  });
});

document.getElementById('shareIG').addEventListener('click', () => {
  const avg = getAvg();
  generateShareImage(avg);
  const canvas = document.getElementById('shareCanvas');
  canvas.toBlob(blob => {
    if (navigator.share) {
      const file = new File([blob], 'reaction-test.png', {type:'image/png'});
      navigator.share({files:[file], title:'反應力測試'}).catch(()=>{});
    } else {
      downloadImage();
    }
  });
});

document.getElementById('shareDL').addEventListener('click', downloadImage);

function downloadImage() {
  const avg = getAvg();
  generateShareImage(avg);
  const canvas = document.getElementById('shareCanvas');
  const link = document.createElement('a');
  link.download = 'reaction-test-' + avg + 'ms.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function getAvg() {
  const totalMs = results.reduce((sum, r) => sum + r.ms, 0);
  return Math.round(totalMs / results.length);
}
