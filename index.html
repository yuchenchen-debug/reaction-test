.btn-outline{background:transparent;border:2px solid #333;color:var(--white)}

#pb-display{color:var(--blue);font-size:14px;margin-top:16px}
.menu-btns{display:flex;gap:12px;margin-top:12px}

#wait-screen .msg{font-size:clamp(32px,10vw,64px);color:#fff;font-weight:800;animation:pulse 1.5s infinite}
#wait-screen .round-indicator{color:rgba(255,255,255,.5);font-size:18px;margin-top:16px}

#ready-screen .msg{font-size:clamp(32px,10vw,72px);color:#000;font-weight:800}
#ready-screen .sub{color:rgba(0,0,0,.6);font-size:18px;margin-top:8px}

#early-screen .msg{font-size:clamp(24px,6vw,42px);color:#fff;font-weight:700}
#early-screen .taunt{color:rgba(255,255,255,.7);font-size:16px;margin-top:12px}
#early-screen .tap-hint{color:rgba(255,255,255,.4);font-size:14px;margin-top:24px}

// Current language
let curLang = 'zh-TW';

function detectLang() {
  const saved = localStorage.getItem('reaction-lang');
  if (saved && LANG[saved]) return saved;
  const nav = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (nav.startsWith('zh-tw') || nav === 'zh-hant' || nav.startsWith('zh-hant')) return 'zh-TW';
  if (nav.startsWith('zh')) return 'zh-TW';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('th')) return 'th';
  if (nav.startsWith('id') || nav.startsWith('ms')) return 'id';
  if (nav.startsWith('vi')) return 'vi';
  if (nav.startsWith('en')) return 'en';
  return 'zh-TW';
}

function t(key) {
  return LANG[curLang][key] || LANG['zh-TW'][key] || key;
}

function applyLang() {
  const L = LANG[curLang];

  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (L[key] !== undefined) {
      if (key === 'statAvg' || key === 'statRecord') {
        el.innerHTML = L[key];
      } else {
        el.textContent = L[key];
      }
    }
  });

  // Update html lang attribute
  const langMap = {'zh-TW':'zh-Hant','en':'en','ja':'ja','ko':'ko','es':'es','pt':'pt','de':'de','fr':'fr','th':'th','id':'id','vi':'vi'};
  document.documentElement.lang = langMap[curLang] || curLang;

  // Update meta tags
  document.title = L.metaTitle;
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.content = L.metaDesc;
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.content = L.ogTitle;
  const ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc) ogDesc.content = L.ogDesc;
  const twTitle = document.querySelector('meta[name="twitter:title"]');
  if (twTitle) twTitle.content = L.twitterTitle;
  const twDesc = document.querySelector('meta[name="twitter:description"]');
  if (twDesc) twDesc.content = L.twitterDesc;

  // Update PB display
  showPB();

  // Update more-games section
  const moreTitle = document.getElementById('moreGamesTitle');
  if (moreTitle) moreTitle.textContent = L.moreGames;
  const g1n = document.getElementById('game1Name');
  if (g1n) g1n.textContent = L.game1Name;
  const g1h = document.getElementById('game1Hook');
  if (g1h) g1h.textContent = L.game1Hook;
  const g2n = document.getElementById('game2Name');
  if (g2n) g2n.textContent = L.game2Name;
  const g2h = document.getElementById('game2Hook');
  if (g2h) g2h.textContent = L.game2Hook;
  const g3n = document.getElementById('game3Name');
  if (g3n) g3n.textContent = L.game3Name;
  const g3h = document.getElementById('game3Hook');
  if (g3h) g3h.textContent = L.game3Hook;

  // Update player count text
  document.getElementById('total-players').textContent = fakeCount();

  // Save preference
  localStorage.setItem('reaction-lang', curLang);
}

// Personal best
function getPB() { return parseInt(localStorage.getItem('reaction-pb') || '0'); }
function setPB(ms) { localStorage.setItem('reaction-pb', ms); }

function showPB() {
  const pb = getPB();
  const el = document.getElementById('pb-display');

// Taunts (localized)
function getEarlyTaunt() {
  const taunts = LANG[curLang].earlyTaunts;
  return taunts[Math.random()*taunts.length|0];
}

function getTaunt(ms) {
  const taunts = LANG[curLang].roundTaunts;
  const thresholds = [150,180,220,270,350,500,9999];
  for (const th of thresholds) {
    if (ms < th) return taunts[th][Math.random()*taunts[th].length|0];
  }
  return taunts[9999][0];
}

function getRank(ms) {
  const L = LANG[curLang].rankLabels;
  if (ms < 150) return {rank:'SSS',color:'#ff2d55',label:L.SSS,pct:0.01};
  if (ms < 170) return {rank:'SS',color:'#ff6b00',label:L.SS,pct:0.1};
  if (ms < 200) return {rank:'S',color:'#ffcc00',label:L.S,pct:1};
  if (ms < 230) return {rank:'A',color:'var(--green)',label:L.A,pct:5};
  if (ms < 270) return {rank:'B',color:'var(--blue)',label:L.B,pct:20};
  if (ms < 350) return {rank:'C',color:'var(--white)',label:L.C,pct:50};
  if (ms < 500) return {rank:'D',color:'var(--gray)',label:L.D,pct:80};
  return {rank:'F',color:'#ff2d55',label:L.F,pct:99};
}

function getAgeCompare(ms) {
  const ages = LANG[curLang].ageCompare;
  for (const [threshold, text] of ages) {
    if (ms < threshold) return text;
  }
  return ages[ages.length - 1][1];
}

// Fake player count
function fakeCount() {
  const base = 3291847;
  const extra = Math.floor((Date.now() - new Date('2026-01-01').getTime()) / 30000);
  return (base + extra).toLocaleString();
}
document.getElementById('total-players').textContent = fakeCount();

// Start
function startGame() {
  currentRound = 0;
  results = [];
  nextRound();
}

function nextRound() {
  currentRound++;
  document.getElementById('roundNum').textContent = currentRound;
  showScreen('waiting');
  const delay = 1000 + Math.random() * 4000;
  greenTimeout = setTimeout(() => {
    greenTime = performance.now();
    showScreen('ready');
  }, delay);
}

// Tap handling
game.addEventListener('click', (e) => {
  if (e.target.closest('button') || e.target.closest('.modal') || e.target.closest('.share-btns') || e.target.closest('.final-btns') || e.target.closest('.menu-btns')) return;

  if (state === 'waiting') {
    // Too early
    clearTimeout(greenTimeout);
    results.push({ms: 1000, foul: true});
    document.getElementById('earlyTaunt').textContent = getEarlyTaunt();
    showScreen('tooearly');
  } else if (state === 'ready') {
    const ms = Math.round(performance.now() - greenTime);
    results.push({ms, foul: false});
    document.getElementById('msDisplay').textContent = ms + 'ms';
    document.getElementById('msDisplay').style.color = ms < 200 ? 'var(--green)' : ms < 300 ? 'var(--white)' : 'var(--red)';
    document.getElementById('roundTaunt').textContent = getTaunt(ms);
    document.getElementById('roundInfo').textContent = LANG[curLang].roundInfo(currentRound, TOTAL_ROUNDS);
    showScreen('result');
  } else if (state === 'tooearly' || state === 'result') {
    if (currentRound < TOTAL_ROUNDS) {
      nextRound();
    } else {
      showFinal();
    }
  }
});

function showFinal() {
  const validResults = results.filter(r => !r.foul);
  const totalMs = results.reduce((sum, r) => sum + r.ms, 0);
  const avg = Math.round(totalMs / results.length);

  const info = getRank(avg);

  document.getElementById('rankBadge').textContent = info.rank;
  document.getElementById('rankBadge').style.color = info.color;
  document.getElementById('rankLabel').textContent = info.label;
  document.getElementById('avgDisplay').textContent = avg + 'ms';
  document.getElementById('tauntFinal').textContent = getTaunt(avg);
  document.getElementById('ageCompare').textContent = getAgeCompare(avg);
  document.getElementById('percentile').textContent = LANG[curLang].percentileText((100 - info.pct).toFixed(2));

  // Rounds list
  const list = document.getElementById('roundsList');
  list.innerHTML = '';
  results.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'round-row';
    const cls = r.foul ? 'foul' : r.ms < 200 ? 'fast' : r.ms < 300 ? 'mid' : 'slow';
    row.innerHTML = `<span class="r-num">${LANG[curLang].roundLabel(i+1)}</span><span class="r-val ${cls}">${r.foul ? t('foulText') : r.ms + 'ms'}</span>`;
    list.appendChild(row);
  });

  // Personal best
  const pb = getPB();
  if (!pb || avg < pb) {
    setPB(avg);
    document.getElementById('pb-final').innerHTML = `<span style="color:var(--green);font-size:14px">${t('newPB')}</span>`;
  } else {
    document.getElementById('pb-final').innerHTML = `<span style="color:var(--gray);font-size:14px">${t('pbLabel')}: ${pb}ms</span>`;
  }

  // Save to Firebase
  saveScore(avg);

  showScreen('final');

  // Try push ads
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
}

// Firebase
function saveScore(avg) {
  const name = 'Player_' + Math.random().toString(36).substr(2,5);
  db.ref('reaction-scores').push({
    name,
    ms: avg,
    rounds: results.map(r => r.foul ? 'foul' : r.ms),
    ts: Date.now()
  }).catch(() => {});
}

function loadLeaderboard() {
  const list = document.getElementById('lbList');
  list.innerHTML = `<div style="color:var(--gray);text-align:center;padding:20px">${t('lbLoading')}</div>`;
  db.ref('reaction-scores').orderByChild('ms').limitToFirst(20).once('value').then(snap => {
    list.innerHTML = '';
    let rank = 0;
    snap.forEach(child => {
      rank++;
      const d = child.val();
      const row = document.createElement('div');
      row.className = 'lb-row';
      const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      row.innerHTML = `<span class="lb-rank">${medal}</span><span class="lb-name">${d.name || 'Anonymous'}</span><span class="lb-ms">${d.ms}ms</span>`;
      list.appendChild(row);
    });
    if (rank === 0) list.innerHTML = `<div style="color:var(--gray);text-align:center;padding:20px">${t('lbEmpty')}</div>`;
  }).catch(() => {
    list.innerHTML = `<div style="color:var(--gray);text-align:center;padding:20px">${t('lbError')}</div>`;
  });
}

// Share
function getShareText(avg) {
  const info = getRank(avg);

function generateShareImage(avg) {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const w = 1080, h = 1080;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);

  // Top accent
  const info = getRank(avg);
  ctx.fillStyle = info.rank === 'F' || info.rank === 'SSS' ? '#ff2d55' : info.color === 'var(--green)' ? '#00ff88' : info.color === 'var(--blue)' ? '#00f0ff' : '#ff2d55';
  ctx.fillRect(0, 0, w, 6);

  // Title
  ctx.fillStyle = '#888';
  ctx.font = '600 36px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(t('shareCanvasTitle'), w/2, 120);

  // Rank
  ctx.font = '800 180px JetBrains Mono, monospace';
  ctx.fillStyle = ctx.fillStyle = info.rank === 'SSS' ? '#ff2d55' : info.rank === 'SS' ? '#ff6b00' : info.rank === 'S' ? '#ffcc00' : info.rank === 'A' ? '#00ff88' : info.rank === 'B' ? '#00f0ff' : '#888';
  ctx.fillText(info.rank, w/2, 360);

  // MS
  ctx.font = '800 140px JetBrains Mono, monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(avg + 'ms', w/2, 540);

  // Label
  ctx.font = '600 32px JetBrains Mono, monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(t('shareCanvasAvg'), w/2, 600);

  // Percentile
  ctx.font = '600 36px JetBrains Mono, monospace';
  ctx.fillStyle = '#00f0ff';
  ctx.fillText(info.label, w/2, 700);

  // Taunt
  ctx.font = '600 32px JetBrains Mono, monospace';
  ctx.fillStyle = '#ff2d55';
  const taunt = getTaunt(avg);
  ctx.fillText(taunt.length > 16 ? taunt.substring(0,16) + '...' : taunt, w/2, 780);

  // Rounds
  ctx.font = '400 28px JetBrains Mono, monospace';
  results.forEach((r, i) => {
    const y = 860 + i * 36;
    ctx.fillStyle = '#555';
    ctx.textAlign = 'left';
    ctx.fillText(`R${i+1}`, 300, y);
    ctx.textAlign = 'right';
    ctx.fillStyle = r.foul ? '#00f0ff' : r.ms < 200 ? '#00ff88' : r.ms < 300 ? '#fff' : '#ff2d55';
    ctx.fillText(r.foul ? t('shareCanvasFoul') : r.ms + 'ms', 780, y);
  });

  // URL
  ctx.textAlign = 'center';
  ctx.font = '400 24px JetBrains Mono, monospace';
  ctx.fillStyle = '#444';
  ctx.fillText('yuchenchen-debug.github.io/reaction-test', w/2, 1055);

  return canvas;
}

.more-games-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.more-games-row::-webkit-scrollbar{display:none}
.game-card{flex:0 0 160px;padding:14px;border-radius:14px;background:#12121a;border:1px solid #1e1e2e;text-decoration:none;color:#e0e0e0;transition:border-color .2s,transform .15s}
.game-card:hover{border-color:#00f0ff;transform:translateY(-2px)}
.game-card .emoji{font-size:28px;display:block;margin-bottom:6px}
.game-card .name{font-size:14px;font-weight:700;margin-bottom:4px}
.game-card .hook{font-size:11px;color:#666;line-height:1.3}
</style>
<div class="more-games">
  <h3 id="moreGamesTitle">🎮 更多挑戰</h3>
  <div class="more-games-row">
    <a class="game-card" href="https://yuchenchen-debug.github.io/millisecond-challenge/">
      <span class="emoji">⏱️</span>
      <div class="name" id="game1Name">千分之一秒</div>
      <div class="hook" id="game1Hook">只有 0.01% 拿到 SSS 級</div>
    </a>
    <a class="game-card" href="https://yuchenchen-debug.github.io/color-iq-test/">
      <span class="emoji">🎨</span>
      <div class="name" id="game2Name">色覺測試</div>
      <div class="hook" id="game2Hook">只有 2.1% 通過 Level 25</div>
    </a>
    <a class="game-card" href="https://yuchenchen-debug.github.io/memory-limit/">
      <span class="emoji">🧠</span>
      <div class="name" id="game3Name">記憶極限</div>
      <div class="hook" id="game3Hook">一般人記住 7 個，你呢？</div>
    </a>
  </div>
</div>

</body>
</html>
